<header class="header">
  <div class="container">

    <div class="logo">
      <a href="#home">
        <img src="/images/logo.png" alt="Sri Vari Catering Logo" />
      </a>
    </div>

    <div class="hamburger" (click)="toggleMenu()">☰</div>

    <nav class="nav" [class.open]="menuOpen">
      <a href="#home" (click)="closeMenu()">Home</a>
      <a href="#about" (click)="closeMenu()">About</a>
      <a href="#services" (click)="closeMenu()">Services</a>
      <a href="#menu" (click)="closeMenu()">Menu</a>
      <a href="#gallery" (click)="closeMenu()">Gallery</a>

      <a href="#contact" style="text-align: center;" class="cta mobile" (click)="closeMenu()">
        Reach Out
      </a>

      <a [href]="signInUrl" target="_blank" rel="noopener"
         style="text-align: center;" class="signin mobile" (click)="closeMenu()">
        🔐 Sign In
      </a>
    </nav>

    <a [href]="signInUrl" target="_blank" rel="noopener" class="signin desktop">
      Sign In
    </a>

  </div>
</header>
