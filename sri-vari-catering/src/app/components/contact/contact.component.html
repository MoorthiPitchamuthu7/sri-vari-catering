<section class="contact" id="contact">
  <div class="container">

    <h2 class="section-title">Get In Touch</h2>
    <p class="subtitle">Let us make your event delicious & memorable</p>

    <div class="contact-box">

      <!-- Info Card -->
      <div class="info-card">
        <h3>Sri Vari Catering</h3>

        <div class="info-item">
          📞 <a href="tel:+919842040824">+91 98420 40824</a>
        </div>

        <div class="info-item">
          💬 <a href="https://wa.me/919842040824" target="_blank">Chat on WhatsApp</a>
        </div>

        <p class="note">
          Available for weddings, parties & corporate events
        </p>
      </div>

      <!-- Form Card -->
      <form class="form-card">
        <input type="text" placeholder="Full Name" [(ngModel)]="name" name="name" />
        <input type="tel" placeholder="Mobile Number" [(ngModel)]="phone" name="phone" />
        <input type="date" [(ngModel)]="date" name="date" />

        <textarea
          placeholder="Tell us about your event (guests, menu, location...)"
          [(ngModel)]="message"
          name="message"
        ></textarea>

        <button type="button" (click)="sendWhatsApp()">
          Send via WhatsApp
        </button>
      </form>

    </div>
  </div>
</section>
